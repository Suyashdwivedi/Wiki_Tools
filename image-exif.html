<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Metadata Explorer - EXIF & GPS Viewer</title>

    <link rel="canonical"
        href="https://suyashdwivedi.github.io/Wiki_Tools/image-exif.html">

    <link rel="icon"
        type="image/png"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Wiki%27s_Lazy_Coders.png/250px-Wiki%27s_Lazy_Coders.png">

    <!-- SEO -->

    <meta name="description"
        content="Extract EXIF metadata and GPS location from images locally in your browser.">

    <meta property="og:title"
        content="Metadata Explorer">

    <meta property="og:description"
        content="Analyze image metadata and GPS coordinates instantly.">

    <meta property="og:image"
        content="https://upload.wikimedia.org/wikipedia/commons/5/53/Wiki_s_Lazy_Coders_logo_small_transparent.png">

    <meta property="og:url"
        content="https://suyashdwivedi.github.io/Wiki_Tools/image-exif.html">

    <meta name="twitter:card"
        content="summary_large_image">

    <!-- EXIF Library -->

    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

    <!-- Analytics -->

    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-GC8PGC89NB">
    </script>

    <script>

        window.dataLayer = window.dataLayer || [];

        function gtag() {
            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'G-GC8PGC89NB');

    </script>

    <!-- Counter -->

    <script src="https://cdn.counter.dev/script.js"
        data-id="cc7a036d-a904-4d76-bcac-37ea4196c014"
        data-utcoffset="6">
    </script>

    <style>

        * {
            box-sizing: border-box;
        }

        :root {

            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #111827;
            --border: #dcdfe5;
            --accent: #2563eb;
        }

        body.dark-mode {

            --bg: #111315;
            --card: #1d1f24;
            --text: #ffffff;
            --border: #2d2f35;
        }

        body {

            margin: 0;

            padding: 25px;

            background: var(--bg);

            color: var(--text);

            font-family: Arial, sans-serif;

            transition: 0.3s;
        }

        header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 20px;

            padding-bottom: 20px;

            margin-bottom: 35px;

            border-bottom: 1px solid var(--border);
        }

        .header-left {

            display: flex;

            align-items: center;

            gap: 20px;
        }

        .logo {

            width: 95px;
        }

        h1 {

            margin: 0;

            font-size: 58px;
        }

        .night-btn {

            border: 1px solid var(--border);

            background: var(--card);

            color: var(--text);

            border-radius: 40px;

            padding: 18px 30px;

            font-size: 20px;

            cursor: pointer;

            font-weight: bold;
        }

        #drop-zone {

            background: var(--card);

            border: 3px dashed var(--border);

            border-radius: 25px;

            padding: 80px 20px;

            text-align: center;

            cursor: pointer;

            transition: 0.3s;
        }

        #drop-zone:hover {

            border-color: var(--accent);
        }

        .hidden {

            display: none;
        }

        .card {

            background: var(--card);

            margin-top: 35px;

            padding: 25px;

            border-radius: 25px;

            border: 1px solid var(--border);
        }

        #preview-image {

            max-width: 100%;

            max-height: 650px;

            display: block;

            margin: auto;

            border-radius: 18px;
        }

        h2 {

            margin-top: 0;

            font-size: 34px;

            margin-bottom: 25px;
        }

        .metadata-grid {

            display: grid;

            grid-template-columns:
                repeat(auto-fit, minmax(320px, 1fr));

            gap: 22px;
        }

        .meta-box {

            background: rgba(255,255,255,0.02);

            border: 1px solid var(--border);

            border-radius: 24px;

            padding: 24px;

            transition: 0.2s;
        }

        .meta-box:hover {

            transform: translateY(-2px);
        }

        .meta-key {

            font-size: 20px;

            font-weight: bold;

            margin-bottom: 14px;

            color: #374151;
        }

        body.dark-mode .meta-key {

            color: #d1d5db;
        }

        .meta-value {

            font-size: 20px;

            line-height: 1.6;

            overflow-wrap: break-word;
        }

        iframe {

            width: 100%;

            height: 450px;

            border: 0;

            border-radius: 18px;

            margin-top: 20px;
        }

        .nav-btn {

            position: fixed;

            right: 25px;

            width: 70px;

            height: 70px;

            border-radius: 50%;

            border: none;

            background: #4a90e2;

            color: white;

            font-size: 35px;

            cursor: pointer;

            z-index: 999;
        }

        #top-btn {

            bottom: 110px;
        }

        #bottom-btn {

            bottom: 25px;
        }

        footer {

            margin-top: 70px;

            border-top: 1px solid var(--border);

            padding: 40px 0;

            text-align: center;

            font-size: 18px;
        }

        a {

            color: #2563eb;

            text-decoration: none;
        }

        @media (max-width: 768px) {

            header {

                flex-direction: column;

                align-items: flex-start;
            }

            h1 {

                font-size: 34px;
            }

            .logo {

                width: 75px;
            }

            .night-btn {

                width: 100%;
            }

            .meta-box {

                padding: 18px;
            }

            .meta-key,
            .meta-value {

                font-size: 18px;
            }
        }

    </style>

</head>

<body>

    <!-- Header -->

    <header>

        <div class="header-left">

            <img class="logo"
                src="https://upload.wikimedia.org/wikipedia/commons/5/53/Wiki_s_Lazy_Coders_logo_small_transparent.png">

            <h1>Metadata Explorer</h1>

        </div>

        <button class="night-btn"
            onclick="toggleDarkMode()">

            🌗 Night Mode

        </button>

    </header>

    <!-- Upload -->

    <div id="drop-zone"
        onclick="document.getElementById('file-input').click()">

        <h2>Drag & Drop Image Here</h2>

        <p>or click to upload image</p>

        <input type="file"
            id="file-input"
            class="hidden"
            accept="image/*">

    </div>

    <!-- Preview -->

    <div id="preview-card"
        class="card hidden">

        <h2>Image Preview</h2>

        <img id="preview-image">

    </div>

    <!-- GPS -->

    <div id="map-card"
        class="card hidden">

        <h2>GPS Location</h2>

        <div id="gps-text"></div>

    </div>

    <!-- Metadata -->

    <div id="metadata-card"
        class="card hidden">

        <h2>Detailed EXIF Metadata</h2>

        <div id="metadata-grid"
            class="metadata-grid">
        </div>

    </div>

    <!-- Navigation Buttons -->

    <button id="top-btn"
        class="nav-btn"
        onclick="window.scrollTo({top:0,behavior:'smooth'})">

        ↑

    </button>

    <button id="bottom-btn"
        class="nav-btn"
        onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">

        ↓

    </button>

    <!-- Footer -->

    <footer>

        Created by

        <a href="https://meta.wikimedia.org/wiki/User:Suyash.dwivedi"
            target="_blank">

            Suyash Dwivedi

        </a>

        |

        Updated on: 9 May 2026

    </footer>

    <script>

        const dropZone =
            document.getElementById('drop-zone');

        const fileInput =
            document.getElementById('file-input');

        const previewCard =
            document.getElementById('preview-card');

        const previewImage =
            document.getElementById('preview-image');

        const metadataCard =
            document.getElementById('metadata-card');

        const metadataGrid =
            document.getElementById('metadata-grid');

        const mapCard =
            document.getElementById('map-card');

        const gpsText =
            document.getElementById('gps-text');

        // Dark Mode

        function toggleDarkMode() {

            document.body.classList.toggle('dark-mode');
        }

        // Drag Events

        dropZone.addEventListener('dragover', (e) => {

            e.preventDefault();

            dropZone.style.borderColor = '#2563eb';
        });

        dropZone.addEventListener('dragleave', () => {

            dropZone.style.borderColor = '';
        });

        dropZone.addEventListener('drop', (e) => {

            e.preventDefault();

            dropZone.style.borderColor = '';

            const file =
                e.dataTransfer.files[0];

            processImage(file);
        });

        fileInput.addEventListener('change', (e) => {

            const file =
                e.target.files[0];

            processImage(file);
        });

        // Main

        async function processImage(file) {

            if (!file) return;

            // Preview

            const imageURL =
                URL.createObjectURL(file);

            previewImage.src =
                imageURL;

            previewCard.classList.remove('hidden');

            metadataGrid.innerHTML = '';

            try {

                const metadata =
                    await exifr.parse(file);

                console.log(metadata);

                metadataCard.classList.remove('hidden');

                if (!metadata) {

                    metadataGrid.innerHTML =
                        '<p>No EXIF metadata found.</p>';

                    return;
                }

                // Metadata Cards

                Object.keys(metadata)
                    .sort()
                    .forEach(tag => {

                        let value =
                            metadata[tag];

                        if (typeof value === 'object') {

                            value =
                                JSON.stringify(value, null, 2);
                        }

                        const card =
                            document.createElement('div');

                        card.className =
                            'meta-box';

                        card.innerHTML = `
                            <div class="meta-key">
                                ${tag}
                            </div>

                            <div class="meta-value">
                                ${value}
                            </div>
                        `;

                        metadataGrid.appendChild(card);
                    });

                // GPS

                if (metadata.latitude &&
                    metadata.longitude) {

                    mapCard.classList.remove('hidden');

                    gpsText.innerHTML = `
                        <p>
                            <strong>Latitude:</strong>
                            ${metadata.latitude}
                            <br><br>

                            <strong>Longitude:</strong>
                            ${metadata.longitude}
                        </p>

                        <iframe
                            loading="lazy"
                            allowfullscreen
                            src="https://www.google.com/maps?q=${metadata.latitude},${metadata.longitude}&z=15&output=embed">
                        </iframe>
                    `;

                } else {

                    mapCard.classList.add('hidden');
                }

            } catch (err) {

                console.error(err);

                alert(
                    'Failed to read EXIF metadata.'
                );
            }
        }

    </script>

</body>

</html>
