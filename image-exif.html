<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Metadata Explorer - EXIF & GPS Viewer</title>

    <link rel="canonical"
        href="https://suyashdwivedi.github.io/Wiki_Tools/image-exif.html">

    <link rel="icon"
        type="image/png"
        href="https://upload.wikimedia.org/wikipedia/commons/thumb/5/55/Wiki%27s_Lazy_Coders.png/250px-Wiki%27s_Lazy_Coders.png">

    <!-- SEO -->

    <meta name="description"
        content="Extract EXIF metadata and GPS location from images locally in your browser.">

    <meta property="og:title"
        content="Metadata Explorer">

    <meta property="og:description"
        content="Analyze image metadata and GPS coordinates instantly.">

    <meta property="og:image"
        content="https://upload.wikimedia.org/wikipedia/commons/5/53/Wiki_s_Lazy_Coders_logo_small_transparent.png">

    <meta property="og:url"
        content="https://suyashdwivedi.github.io/Wiki_Tools/image-exif.html">

    <meta name="twitter:card"
        content="summary_large_image">

    <!-- EXIF Library -->

    <script src="https://cdn.jsdelivr.net/npm/exifr/dist/full.umd.js"></script>

    <!-- Google Analytics -->

    <script async
        src="https://www.googletagmanager.com/gtag/js?id=G-GC8PGC89NB">
    </script>

    <script>

        window.dataLayer = window.dataLayer || [];

        function gtag() {

            dataLayer.push(arguments);
        }

        gtag('js', new Date());

        gtag('config', 'G-GC8PGC89NB');

    </script>

    <!-- Counter -->

    <script src="https://cdn.counter.dev/script.js"
        data-id="cc7a036d-a904-4d76-bcac-37ea4196c014"
        data-utcoffset="6">
    </script>

    <style>

        * {

            box-sizing: border-box;
        }

        :root {

            --bg-color: #f5f5f5;
            --card-color: #ffffff;
            --text-color: #111;
            --border-color: #ddd;
            --accent: #4a90e2;
        }

        body.dark-mode {

            --bg-color: #111315;
            --card-color: #1c1e22;
            --text-color: #ffffff;
            --border-color: #333;
        }

        body {

            margin: 0;
            padding: 20px;

            background: var(--bg-color);

            color: var(--text-color);

            font-family: Arial, sans-serif;

            transition: 0.3s;
        }

        header {

            display: flex;

            justify-content: space-between;

            align-items: center;

            gap: 20px;

            padding-bottom: 20px;

            margin-bottom: 30px;

            border-bottom: 1px solid var(--border-color);
        }

        .header-left {

            display: flex;

            align-items: center;

            gap: 20px;
        }

        .logo {

            width: 110px;
        }

        h1 {

            margin: 0;

            font-size: 60px;
        }

        .night-btn {

            border: 1px solid var(--border-color);

            background: var(--card-color);

            color: var(--text-color);

            border-radius: 40px;

            padding: 18px 30px;

            font-size: 20px;

            cursor: pointer;

            font-weight: bold;
        }

        #drop-zone {

            background: var(--card-color);

            border: 3px dashed var(--border-color);

            border-radius: 20px;

            padding: 70px 20px;

            text-align: center;

            cursor: pointer;

            transition: 0.3s;
        }

        #drop-zone:hover {

            border-color: var(--accent);
        }

        .hidden {

            display: none;
        }

        .card {

            background: var(--card-color);

            margin-top: 30px;

            padding: 25px;

            border-radius: 20px;

            border: 1px solid var(--border-color);

            overflow: hidden;
        }

        #preview-image {

            max-width: 100%;

            max-height: 600px;

            display: block;

            margin: auto;

            border-radius: 15px;
        }

        table {

            width: 100%;

            border-collapse: collapse;
        }

        th,
        td {

            border-bottom: 1px solid var(--border-color);

            padding: 12px;

            text-align: left;

            vertical-align: top;
        }

        th {

            color: var(--accent);
        }

        iframe {

            width: 100%;

            height: 450px;

            border: 0;

            border-radius: 15px;

            margin-top: 20px;
        }

        .nav-btn {

            position: fixed;

            right: 25px;

            width: 70px;

            height: 70px;

            border-radius: 50%;

            border: none;

            background: #4a90e2;

            color: white;

            font-size: 35px;

            cursor: pointer;

            z-index: 999;
        }

        #top-btn {

            bottom: 110px;
        }

        #bottom-btn {

            bottom: 25px;
        }

        footer {

            margin-top: 60px;

            border-top: 1px solid var(--border-color);

            padding: 40px 0;

            text-align: center;

            font-size: 18px;
        }

        a {

            color: #4a90e2;

            text-decoration: none;
        }

        @media (max-width: 768px) {

            header {

                flex-direction: column;

                align-items: flex-start;
            }

            h1 {

                font-size: 36px;
            }

            .logo {

                width: 80px;
            }

            .night-btn {

                width: 100%;
            }
        }

    </style>

</head>

<body id="top">

    <!-- Header -->

    <header>

        <div class="header-left">

            <img class="logo"
                src="https://upload.wikimedia.org/wikipedia/commons/5/53/Wiki_s_Lazy_Coders_logo_small_transparent.png">

            <h1>Metadata Explorer</h1>

        </div>

        <button class="night-btn"
            onclick="toggleDarkMode()">

            🌗 Night Mode

        </button>

    </header>

    <!-- Upload -->

    <div id="drop-zone"
        onclick="document.getElementById('file-input').click()">

        <h2>Drag & Drop Image Here</h2>

        <p>or click to upload image</p>

        <input type="file"
            id="file-input"
            class="hidden"
            accept="image/*">

    </div>

    <!-- Preview -->

    <div id="preview-card"
        class="card hidden">

        <h2>Image Preview</h2>

        <img id="preview-image">

    </div>

    <!-- GPS -->

    <div id="map-card"
        class="card hidden">

        <h2>GPS Location</h2>

        <div id="gps-text"></div>

    </div>

    <!-- Metadata -->

    <div id="metadata-card"
        class="card hidden">

        <h2>Detailed EXIF Metadata</h2>

        <table>

            <thead>

                <tr>

                    <th>Tag</th>

                    <th>Value</th>

                </tr>

            </thead>

            <tbody id="metadata-body"></tbody>

        </table>

    </div>

    <!-- Navigation Buttons -->

    <button id="top-btn"
        class="nav-btn"
        onclick="window.scrollTo({top:0,behavior:'smooth'})">

        ↑

    </button>

    <button id="bottom-btn"
        class="nav-btn"
        onclick="window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})">

        ↓

    </button>

    <!-- Footer -->

    <footer>

        Created by

        <a href="https://meta.wikimedia.org/wiki/User:Suyash.dwivedi"
            target="_blank">

            Suyash Dwivedi

        </a>

        |

        Updated on: 9 May 2026

    </footer>

    <script>

        const dropZone =
            document.getElementById('drop-zone');

        const fileInput =
            document.getElementById('file-input');

        const previewCard =
            document.getElementById('preview-card');

        const previewImage =
            document.getElementById('preview-image');

        const metadataCard =
            document.getElementById('metadata-card');

        const metadataBody =
            document.getElementById('metadata-body');

        const mapCard =
            document.getElementById('map-card');

        const gpsText =
            document.getElementById('gps-text');

        function toggleDarkMode() {

            document.body.classList.toggle('dark-mode');
        }

        // Drag Over

        dropZone.addEventListener('dragover', (e) => {

            e.preventDefault();

            dropZone.style.borderColor = '#4a90e2';
        });

        // Drag Leave

        dropZone.addEventListener('dragleave', () => {

            dropZone.style.borderColor = '';
        });

        // Drop

        dropZone.addEventListener('drop', (e) => {

            e.preventDefault();

            dropZone.style.borderColor = '';

            const file =
                e.dataTransfer.files[0];

            processImage(file);
        });

        // File Select

        fileInput.addEventListener('change', (e) => {

            const file =
                e.target.files[0];

            processImage(file);
        });

        // Main Function

        async function processImage(file) {

            if (!file) return;

            // Preview

            const imageURL =
                URL.createObjectURL(file);

            previewImage.src =
                imageURL;

            previewCard.classList.remove('hidden');

            metadataBody.innerHTML = '';

            try {

                const metadata =
                    await exifr.parse(file);

                console.log(metadata);

                metadataCard.classList.remove('hidden');

                if (!metadata) {

                    metadataBody.innerHTML =
                        '<tr><td colspan=\"2\">No EXIF metadata found.</td></tr>';

                    return;
                }

                // Metadata Table

                Object.keys(metadata)
                    .sort()
                    .forEach(tag => {

                        let value =
                            metadata[tag];

                        if (typeof value === 'object') {

                            value =
                                JSON.stringify(value, null, 2);
                        }

                        const row =
                            metadataBody.insertRow();

                        row.insertCell(0).innerHTML =
                            `<strong>${tag}</strong>`;

                        row.insertCell(1).innerText =
                            value;
                    });

                // Google Maps

                if (metadata.latitude &&
                    metadata.longitude) {

                    mapCard.classList.remove('hidden');

                    gpsText.innerHTML = `
                        <p>
                            <strong>Latitude:</strong>
                            ${metadata.latitude}
                            <br>
                            <strong>Longitude:</strong>
                            ${metadata.longitude}
                        </p>

                        <iframe
                            loading="lazy"
                            allowfullscreen
                            src="https://www.google.com/maps?q=${metadata.latitude},${metadata.longitude}&z=15&output=embed">
                        </iframe>
                    `;

                } else {

                    mapCard.classList.add('hidden');
                }

            } catch (err) {

                console.error(err);

                alert(
                    'Failed to read EXIF metadata.'
                );
            }
        }

    </script>

</body>

</html>
