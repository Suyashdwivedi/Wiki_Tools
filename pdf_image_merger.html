<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 35px;
            max-width: 700px;
            width: 100%;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── HEADER / LOGO ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            gap: 20px;
        }

        .logo { flex-shrink: 0; }
        .logo a { text-decoration: none; display: inline-block; }
        .logo img {
            width: 70px; height: 70px;
            object-fit: contain;
            transition: transform 0.3s, filter 0.3s;
            cursor: pointer;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
        }
        .logo img:hover {
            transform: scale(1.15) rotate(5deg);
            filter: drop-shadow(0 6px 12px rgba(0,0,0,0.2));
        }
        /* Fallback SVG logo shown when the external image fails */
        .logo-fallback {
            display: none;
            width: 70px; height: 70px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            align-items: center; justify-content: center;
            font-size: 32px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 4px 12px rgba(102,126,234,0.3);
        }
        .logo-fallback:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 8px 20px rgba(102,126,234,0.5);
        }

        .header-text { text-align: center; }

        h1 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 32px;
            margin: 0 0 8px 0;
            font-weight: bold;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .subtitle { color: #666; font-size: 15px; margin: 0; animation: fadeIn 1s ease-out; }

        /* ── DROP ZONE / FILE LIST ── */
        .file-list {
            border: 3px dashed #667eea;
            background: linear-gradient(white, white) padding-box;
            border-radius: 10px;
            min-height: 300px;
            max-height: 300px;
            overflow-y: auto;
            padding: 10px;
            margin-bottom: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(102,126,234,0.1);
            transition: all 0.25s ease;
            position: relative;
        }

        .file-list.drag-over {
            border-color: #764ba2;
            border-style: solid;
            background: rgba(102,126,234,0.05);
            box-shadow: 0 4px 25px rgba(102,126,234,0.3);
        }

        /* Drop hint banner */
        .drop-hint {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            gap: 8px;
            color: #764ba2;
            font-weight: 700;
            font-size: 18px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .drop-hint span { font-size: 42px; }
        .file-list.drag-over .drop-hint { opacity: 1; }

        .file-list::-webkit-scrollbar { width: 8px; }
        .file-list::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .file-list::-webkit-scrollbar-thumb { background: linear-gradient(135deg,#667eea,#764ba2); border-radius: 10px; }
        .file-list::-webkit-scrollbar-thumb:hover { background: linear-gradient(135deg,#764ba2,#667eea); }

        /* ── FILE ITEMS (drag-to-reorder) ── */
        .file-item {
            background: linear-gradient(135deg,#f5f7fa 0%,#c3cfe2 100%);
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            cursor: grab;
            transition: all 0.25s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            user-select: none;
        }

        .file-item:hover { background: linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%); transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .file-item.selected { background: linear-gradient(135deg,#667eea 0%,#764ba2 100%); color: white; transform: scale(1.02); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .file-item.dragging { opacity: 0.45; cursor: grabbing; transform: scale(0.97); }
        .file-item.drag-target { border: 2px dashed #667eea; }

        .drag-handle { font-size: 16px; margin-right: 8px; opacity: 0.45; cursor: grab; }
        .file-icon { font-size: 20px; margin-right: 10px; }
        .file-name { flex: 1; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-size { font-size: 11px; color: #888; margin-left: 8px; }
        .file-item.selected .file-size { color: rgba(255,255,255,0.7); }

        /* ── OPTIONS ── */
        .options {
            background: linear-gradient(135deg,#ffecd2 0%,#fcb69f 20%,#ffecd2 100%);
            padding: 18px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(252,182,159,0.3);
            border: 2px solid rgba(255,255,255,0.5);
        }

        .option-row {
            margin-bottom: 12px;
            background: rgba(255,255,255,0.7);
            padding: 10px;
            border-radius: 6px;
            transition: all 0.3s ease;
        }
        .option-row:hover { background: rgba(255,255,255,0.9); transform: translateX(3px); }
        .option-row:last-child { margin-bottom: 0; }

        label { display: flex; align-items: center; font-size: 14px; color: #333; cursor: pointer; flex-wrap: wrap; gap: 6px; }

        select, input[type="number"] {
            padding: 10px; border: 2px solid #667eea; border-radius: 6px;
            font-size: 14px; margin-left: 10px; background: white; transition: all 0.3s;
        }
        select:hover, input[type="number"]:hover { border-color: #764ba2; box-shadow: 0 2px 8px rgba(102,126,234,0.2); }
        select:focus, input[type="number"]:focus { outline: none; border-color: #764ba2; box-shadow: 0 0 0 3px rgba(102,126,234,0.1); }
        select { cursor: pointer; }

        input[type="checkbox"] { margin-right: 8px; cursor: pointer; width: 20px; height: 20px; accent-color: #667eea; }

        .custom-width { display: none; margin-top: 8px; align-items: center; gap: 6px; }
        .custom-width.show { display: flex; }
        .custom-width input { width: 90px; margin-left: 0; }
        .cm-label { font-size: 13px; color: #555; font-weight: 600; }

        /* ── BUTTONS ── */
        .buttons { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 15px; }

        button {
            padding: 14px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            position: relative; overflow: hidden;
        }
        button::before {
            content: ''; position: absolute; top: 50%; left: 50%;
            width: 0; height: 0; border-radius: 50%;
            background: rgba(255,255,255,0.3);
            transform: translate(-50%,-50%);
            transition: width 0.6s, height 0.6s;
        }
        button:hover::before { width: 300px; height: 300px; }
        button:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,0,0,0.2); }
        button:active { transform: translateY(-1px); }

        .btn-add   { background: linear-gradient(135deg,#11998e,#38ef7d); color: white; }
        .btn-add:hover { background: linear-gradient(135deg,#38ef7d,#11998e); }
        .btn-remove { background: linear-gradient(135deg,#ee9ca7,#ffdde1); color: #333; }
        .btn-remove:hover { background: linear-gradient(135deg,#ffdde1,#ee9ca7); }
        .btn-clear  { background: linear-gradient(135deg,#ff6b6b,#ee5a6f); color: white; }
        .btn-clear:hover  { background: linear-gradient(135deg,#ee5a6f,#ff6b6b); }
        .btn-merge  { background: linear-gradient(135deg,#667eea,#764ba2); color: white; }
        .btn-merge:hover  { background: linear-gradient(135deg,#764ba2,#667eea); }

        /* ── STATUS / PROGRESS ── */
        .status {
            text-align: center; color: #667eea; font-size: 14px;
            margin-bottom: 10px; font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.7; } }

        .progress { display: none; margin-top: 10px; }
        .progress-bar {
            width: 100%; height: 30px;
            background: linear-gradient(135deg,#f5f7fa,#c3cfe2);
            border-radius: 15px; overflow: hidden; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .progress-fill {
            height: 100%; background: linear-gradient(135deg,#667eea,#764ba2);
            width: 0%; transition: width 0.3s;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 13px; font-weight: bold;
            box-shadow: 0 2px 10px rgba(102,126,234,0.5);
            animation: progressGlow 1.5s ease-in-out infinite;
        }
        @keyframes progressGlow {
            0%,100% { box-shadow: 0 2px 10px rgba(102,126,234,0.5); }
            50%      { box-shadow: 0 2px 20px rgba(102,126,234,0.8); }
        }

        /* ── CREDIT ── */
        .credit { text-align: center; font-size: 12px; color: #999; margin-top: 8px; }
        .credit a { color: #667eea; text-decoration: none; font-weight: 600; transition: all 0.3s; }
        .credit a:hover { color: #764ba2; text-decoration: underline; }

        input[type="file"] { display: none; }

        .empty-state {
            text-align: center; color: #666;
            padding: 50px 20px; font-size: 15px;
            background: linear-gradient(135deg,#ffecd2 0%,#fcb69f 100%);
            border-radius: 10px; animation: fadeIn 1s ease-out; font-weight: 500;
            pointer-events: none;
        }
        .empty-state .drop-icon { font-size: 48px; display: block; margin-bottom: 12px; }

        /* Responsive */
        @media (max-width: 600px) {
            .header { flex-direction: column; text-align: center; gap: 10px; }
            .buttons { grid-template-columns: 1fr 1fr; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="logo">
            <a href="https://suyashdwivedi.github.io/Wiki_Tools/" target="_blank" title="Wiki's Lazy Coders">
                <img id="logoImg"
                     src="https://upload.wikimedia.org/wikipedia/commons/5/53/Wiki_s_Lazy_Coders_logo_small_transparent.png"
                     alt="Wiki's Lazy Coders Logo"
                     onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
            </a>
         <!--    <a id="logoFallback" class="logo-fallback"
               href="https://suyashdwivedi.github.io/Wiki_Tools/" target="_blank" title="Wiki's Lazy Coders">
                📄
            </a>-->
        </div>
        <div class="header-text">
            <h1>PDF &amp; Image Merger</h1>
            <p class="subtitle">Merge PDF files and images (JPG, PNG, GIF) into a single PDF</p>
        </div>
    </div>

    <!-- FILE LIST / DROP ZONE -->
    <div class="file-list" id="fileList">
        <div class="empty-state" id="emptyState">
            <span class="drop-icon">📂</span>
            No files added yet.<br>
            Click <strong>Add Files</strong> or <strong>drag &amp; drop files here</strong>.
        </div>
        <div class="drop-hint" id="dropHint">
            <span>⬇️</span>
            Drop files here
        </div>
    </div>

    <!-- OPTIONS -->
    <div class="options">
        <div class="option-row">
            <label>
                <input type="checkbox" id="compressCheck" checked>
                📦 Compress images for A4 print quality (reduces file size)
            </label>
        </div>
        <div class="option-row">
            <label>
                📏 Image width:
                <select id="widthSelect">
                    <option value="fit">Fit to Page</option>
                    <option value="half">Half Size of Page</option>
                    <option value="quarter">Quarter Size</option>
                    <option value="custom">Custom Width</option>
                </select>
            </label>
            <div class="custom-width" id="customWidth">
                <input type="number" id="customWidthValue" placeholder="e.g. 10" value="10" min="1" max="21" step="0.5">
                <span class="cm-label">cm</span>
                <span style="font-size:11px;color:#888;">(max 21 cm = A4 width)</span>
            </div>
        </div>
    </div>

    <!-- BUTTONS -->
    <div class="buttons">
        <button class="btn-add"    onclick="selectFiles()">➕ Add Files</button>
        <button class="btn-remove" onclick="removeSelected()">🗑️ Remove</button>
        <button class="btn-clear"  onclick="clearAll()">✖️ Clear All</button>
        <button class="btn-merge"  onclick="mergeFiles()">📄 Merge &amp; Save</button>
    </div>

    <div class="progress" id="progress">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill">0%</div>
        </div>
    </div>

    <div class="status" id="status">Ready to merge files</div>

    <div class="credit">
        Created by <a href="https://meta.wikimedia.org/wiki/User:Suyash.dwivedi" target="_blank">Suyash Dwivedi | Updated on  03/April/2026</a>
    </div>

    <input type="file" id="fileInput" multiple accept=".pdf,.jpg,.jpeg,.png,.gif,.html">
</div>

<script>
    const { PDFDocument } = PDFLib;
    let files = [];
    let selectedIndices = new Set();
    let dragSrcIndex = null;  // for item-reorder drag

    // ── Show/hide custom width ──────────────────────────────────────
    document.getElementById('widthSelect').addEventListener('change', function () {
        document.getElementById('customWidth').classList.toggle('show', this.value === 'custom');
    });

    // ── File input (button) ─────────────────────────────────────────
    function selectFiles() { document.getElementById('fileInput').click(); }

    document.getElementById('fileInput').addEventListener('change', function (e) {
        addFiles(Array.from(e.target.files));
        e.target.value = '';
    });

    function addFiles(newFiles) {
        newFiles.forEach(f => files.push(f));
        renderFileList();
        updateStatus(`Added ${newFiles.length} file(s) — Total: ${files.length} file(s)`);
    }

    // ── Drag-and-drop FILES onto the list area ───────────────────────
    const fileList = document.getElementById('fileList');

    fileList.addEventListener('dragenter', e => {
        if (e.dataTransfer.types.includes('Files')) {
            e.preventDefault();
            fileList.classList.add('drag-over');
        }
    });
    fileList.addEventListener('dragover', e => {
        if (e.dataTransfer.types.includes('Files')) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        }
    });
    fileList.addEventListener('dragleave', e => {
        // Only remove class when leaving the list itself (not a child)
        if (!fileList.contains(e.relatedTarget)) {
            fileList.classList.remove('drag-over');
        }
    });
    fileList.addEventListener('drop', e => {
        e.preventDefault();
        fileList.classList.remove('drag-over');
        const dropped = Array.from(e.dataTransfer.files).filter(f =>
            f.type === 'application/pdf' || f.type.startsWith('image/')
        );
        if (dropped.length) {
            addFiles(dropped);
        } else {
            updateStatus('⚠️ Only PDF and image files are supported');
        }
    });

    // Also accept drops on the whole page (convenience)
    document.addEventListener('dragover', e => e.preventDefault());
    document.addEventListener('drop', e => {
        if (e.target === fileList || fileList.contains(e.target)) return;
        e.preventDefault();
        const dropped = Array.from(e.dataTransfer.files).filter(f =>
            f.type === 'application/pdf' || f.type.startsWith('image/')
        );
        if (dropped.length) addFiles(dropped);
    });

    // ── Render file list ────────────────────────────────────────────
    function renderFileList() {
        const list = document.getElementById('fileList');
        const empty = document.getElementById('emptyState');
        const hint  = document.getElementById('dropHint');

        // remove old items (keep emptyState & dropHint)
        Array.from(list.children).forEach(c => {
            if (c !== empty && c !== hint) list.removeChild(c);
        });

        if (files.length === 0) {
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';

        files.forEach((file, index) => {
            const item = document.createElement('div');
            item.className = 'file-item' + (selectedIndices.has(index) ? ' selected' : '');
            item.draggable = true;
            item.dataset.index = index;

            const icon   = file.type === 'application/pdf' ? '📄' : '🖼️';
            const sizeKB = (file.size / 1024).toFixed(1);
            const sizeStr = file.size > 1024 * 1024
                ? (file.size / (1024 * 1024)).toFixed(1) + ' MB'
                : sizeKB + ' KB';

            item.innerHTML = `
                <span class="drag-handle" title="Drag to reorder">⠿</span>
                <span class="file-icon">${icon}</span>
                <span class="file-name">${file.name}</span>
                <span class="file-size">${sizeStr}</span>
            `;

            // Click = select/deselect
            item.addEventListener('click', () => toggleSelection(index));

            // Drag-to-reorder events
            item.addEventListener('dragstart', onItemDragStart);
            item.addEventListener('dragover',  onItemDragOver);
            item.addEventListener('drop',      onItemDrop);
            item.addEventListener('dragend',   onItemDragEnd);

            list.insertBefore(item, hint);
        });
    }

    // ── Drag-to-reorder logic ───────────────────────────────────────
    function onItemDragStart(e) {
        // Only proceed for item-reorder (not file drop from OS)
        dragSrcIndex = parseInt(e.currentTarget.dataset.index);
        e.currentTarget.classList.add('dragging');
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', dragSrcIndex); // required for FF
    }

    function onItemDragOver(e) {
        if (dragSrcIndex === null) return;
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        document.querySelectorAll('.file-item').forEach(el => el.classList.remove('drag-target'));
        e.currentTarget.classList.add('drag-target');
    }

    function onItemDrop(e) {
        e.preventDefault();
        e.stopPropagation(); // prevent window drop handler
        const targetIndex = parseInt(e.currentTarget.dataset.index);
        if (dragSrcIndex !== null && dragSrcIndex !== targetIndex) {
            const moved = files.splice(dragSrcIndex, 1)[0];
            files.splice(targetIndex, 0, moved);
            // Adjust selectedIndices
            selectedIndices.clear();
            renderFileList();
            updateStatus('Files reordered');
        }
    }

    function onItemDragEnd(e) {
        dragSrcIndex = null;
        document.querySelectorAll('.file-item').forEach(el => {
            el.classList.remove('dragging', 'drag-target');
        });
    }

    // ── Selection ───────────────────────────────────────────────────
    function toggleSelection(index) {
        if (selectedIndices.has(index)) selectedIndices.delete(index);
        else selectedIndices.add(index);
        renderFileList();
    }

    function removeSelected() {
        if (selectedIndices.size === 0) { alert('No files selected to remove!'); return; }
        const count = selectedIndices.size;
        files = files.filter((_, i) => !selectedIndices.has(i));
        selectedIndices.clear();
        renderFileList();
        updateStatus(`Removed ${count} file(s) — Total: ${files.length} file(s)`);
    }

    function clearAll() {
        if (files.length === 0) return;
        if (confirm('Clear all files from the list?')) {
            files = []; selectedIndices.clear();
            renderFileList();
            updateStatus('List cleared');
        }
    }

    // ── Status / Progress ───────────────────────────────────────────
    function updateStatus(msg) { document.getElementById('status').textContent = msg; }

    function updateProgress(pct, text) {
        const wrap = document.getElementById('progress');
        const fill = document.getElementById('progressFill');
        if (pct > 0) {
            wrap.style.display = 'block';
            fill.style.width = pct + '%';
            fill.textContent = text || pct + '%';
        } else {
            wrap.style.display = 'none';
        }
    }

    // ── Image helper ────────────────────────────────────────────────
    // Always converts to JPEG via canvas (handles PNG, GIF, JPG uniformly).
    // Returns { base64, mimeType } – base64 has NO data-URL prefix.
    async function imageToBase64(file, compress) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let w = img.width, h = img.height;
                    if (compress && (w > 1240 || h > 1754)) {
                        const s = Math.min(1240 / w, 1754 / h);
                        w = Math.round(w * s);
                        h = Math.round(h * s);
                    }
                    canvas.width = w; canvas.height = h;
                    // White background so transparent PNGs look correct in PDF
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(0, 0, w, h);
                    ctx.drawImage(img, 0, 0, w, h);
                    // Always output as JPEG – pdf-lib embedJpg is most compatible
                    const dataUrl = canvas.toDataURL('image/jpeg', compress ? 0.88 : 1.0);
                    // Strip the data-URL prefix; pdf-lib needs raw base64
                    const base64 = dataUrl.split(',')[1];
                    resolve({ base64, mimeType: 'image/jpeg' });
                };
                img.onerror = reject;
                img.src = e.target.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });
    }

    // ── Merge ───────────────────────────────────────────────────────
    async function mergeFiles() {
        if (files.length === 0) { alert('No files to merge!'); return; }

        try {
            updateStatus('Merging files… Please wait');
            updateProgress(0, 'Starting…');

            const mergedPdf = await PDFDocument.create();
            const compress      = document.getElementById('compressCheck').checked;
            const widthOption   = document.getElementById('widthSelect').value;
            const customWidthCm = parseFloat(document.getElementById('customWidthValue').value) || 10;
            const CM_TO_PT      = 28.3465;  // 1 cm = 28.3465 PDF points

            const A4_W   = 210 * 2.83465;  // ≈ 595 pt
            const A4_H   = 297 * 2.83465;  // ≈ 842 pt
            const MARGIN =  10 * 2.83465;  // ≈  28 pt

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                updateProgress(Math.round(((i + 1) / files.length) * 100), `Processing ${i+1}/${files.length}`);

                if (file.type === 'application/pdf') {
                    const buf  = await file.arrayBuffer();
                    const pdf  = await PDFDocument.load(buf);
                    const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    pages.forEach(p => mergedPdf.addPage(p));

                } else if (file.type.startsWith('image/')) {
                    // Convert any image → JPEG base64 (no data-URL prefix)
                    const { base64 } = await imageToBase64(file, compress);

                    // Decode base64 → Uint8Array for pdf-lib
                    const binaryStr  = atob(base64);
                    const imgBytes   = new Uint8Array(binaryStr.length);
                    for (let b = 0; b < binaryStr.length; b++) imgBytes[b] = binaryStr.charCodeAt(b);

                    // Embed as JPEG (canvas always outputs JPEG regardless of input type)
                    const embeddedImage = await mergedPdf.embedJpg(imgBytes);

                    const page    = mergedPdf.addPage([A4_W, A4_H]);
                    const usableW = A4_W - 2 * MARGIN;
                    const usableH = A4_H - 2 * MARGIN;
                    const iw = embeddedImage.width, ih = embeddedImage.height;

                    let scale;
                    switch (widthOption) {
                        case 'half':    scale = (usableW / 2) / iw;           break;
                        case 'quarter': scale = (usableW / 4) / iw;           break;
                        case 'custom':  scale = (customWidthCm * CM_TO_PT) / iw; break;
                        default:        scale = Math.min(usableW / iw, usableH / ih); // fit
                    }
                    // Clamp height overflow
                    if (ih * scale > usableH) scale = usableH / ih;
                    // Never upscale past native resolution
                    if (scale > 1) scale = 1;

                    const sw = iw * scale, sh = ih * scale;
                    page.drawImage(embeddedImage, {
                        x: (A4_W - sw) / 2,
                        y: (A4_H - sh) / 2,
                        width: sw, height: sh
                    });
                }
            }

            updateProgress(100, 'Saving…');
            const pdfBytes = await mergedPdf.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url  = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'merged_output.pdf';
            a.click();
            URL.revokeObjectURL(url);

            updateProgress(0);
            updateStatus(`✅ Success! Merged ${files.length} file(s)`);

            setTimeout(() => {
                files = []; selectedIndices.clear();
                renderFileList();
                updateStatus('Ready to merge files');
            }, 2500);

        } catch (err) {
            console.error(err);
            alert('Error during merge: ' + err.message);
            updateStatus('❌ Error during merge');
            updateProgress(0);
        }
    }
</script>
